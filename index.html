<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLOMON KIN | MASTER REGISTRY</title>
    <style>
        :root {
            --sk-blue: #00f2ff;
            --sk-dark-bg: #050a0f;
            --sk-surface: rgba(16, 25, 35, 0.85);
            --sk-border: rgba(0, 242, 255, 0.3);
            --sk-text: #e0e6ed;
            --sk-glow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        body {
            background-color: var(--sk-dark-bg);
            background-image: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--sk-text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Top Command Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(5, 10, 15, 0.95);
            border-bottom: 2px solid var(--sk-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { font-weight: 900; letter-spacing: 3px; color: var(--sk-blue); }

        .nav-links button {
            background: none;
            border: none;
            color: var(--sk-text);
            margin-left: 25px;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links button:hover { color: var(--sk-blue); text-shadow: var(--sk-glow); }

        /* Content Container */
        .viewport {
            max-width: 1300px;
            margin: 40px auto;
            padding: 20px;
            min-height: 80vh;
        }

        /* Glassmorphism Table Styles */
        .registry-card {
            background: var(--sk-surface);
            border: 1px solid var(--sk-border);
            border-radius: 4px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--sk-blue); border-bottom: 1px solid var(--sk-blue); font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; font-family: 'Courier New', monospace; }

        /* UI Components */
        .btn-verify {
            background: transparent;
            border: 1px solid var(--sk-blue);
            color: var(--sk-blue);
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-verify:hover { background: var(--sk-blue); color: black; }

        .status-pill {
            border: 1px solid var(--sk-blue);
            padding: 2px 8px;
            font-size: 0.65rem;
            border-radius: 10px;
        }

        .rights-gold { color: #ffd700; font-weight: bold; }

        /* Grid for Services */
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .service-item { border: 1px solid var(--sk-border); padding: 20px; background: rgba(0,0,0,0.3); }

        /* Footer */
        .master-footer {
            text-align: center;
            padding: 60px;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid var(--sk-border);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-area">SOLOMON KIN RECORDS | MEDIA GROUP</div>
        <div class="nav-links">
            <button onclick="renderRegistry()">Registry</button>
            <button onclick="renderServices()">Services</button>
            <button onclick="renderVerifier()">Verifier</button>
            <button onclick="renderPortal()">The Vault</button>
        </div>
    </nav>

    <div id="main-view" class="viewport">
        </div>

    <footer class="master-footer">
        © 2026 SOLOMON KIN RECORDS, LLC. ARCHITECTS OF THE NEW MEDIA LANDSCAPE. <br>
        VEXILLA AiTS DATA SECURITY PROTOCOL ACTIVE.
    </footer>

    <script>
        let db = [];

        // INITIALIZE SYSTEM
        async function init() {
            try {
                const res = await fetch('database.json');
                const data = await res.json();
                db = data.companies;
                renderRegistry();
            } catch (e) {
                document.getElementById('main-view').innerHTML = "SYSTEM ERROR: DATABASE LINK SEVERED.";
            }
        }

        // VIEW: REGISTRY
        function renderRegistry() {
            let html = `
                <div class="registry-card">
                    <h2>GLOBAL CONGLOMERATE REGISTRY</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>ENTITY NAME</th>
                                <th>INDUSTRY</th>
                                <th>OWNERSHIP</th>
                                <th>ACTION</th>
                            </tr>
                        </thead>
                        <tbody>`;
            db.forEach(c => {
                html += `
                    <tr>
                        <td>${c.id}</td>
                        <td style="color:var(--sk-blue)">${c.name}</td>
                        <td>${c.industry}</td>
                        <td class="rights-gold">100% MASTER/PUB</td>
                        <td><button class="btn-verify" onclick="alert('Viewing: ${c.name}')">RECORDS</button></td>
                    </tr>`;
            });
            html += `</tbody></table></div>`;
            document.getElementById('main-view').innerHTML = html;
        }

        // VIEW: SERVICES
        function renderServices() {
            const svcs = [
                { name: "IP Audit & Certification", price: "$499" },
                { name: "AI Character Performance Licensing", price: "$1,200" },
                { name: "Vexilla DataTrust Archiving", price: "$250" },
                { name: "Sync Catalog Master Clearance", price: "$850" }
            ];
            let html = `<h2>AUTONOMOUS SERVICE PORTAL</h2><div class="service-grid">`;
            svcs.forEach(s => {
                html += `
                    <div class="service-item">
                        <h3>${s.name}</h3>
                        <p>Immediate industrial-grade verification and record creation.</p>
                        <div style="font-size:1.5rem; color:var(--sk-blue); margin: 10px 0;">${s.price}</div>
                        <button class="btn-verify" style="width:100%">PROCURE SERVICE</button>
                    </div>`;
            });
            html += `</div>`;
            document.getElementById('main-view').innerHTML = html;
        }

        // VIEW: VERIFIER
        function renderVerifier() {
            document.getElementById('main-view').innerHTML = `
                <div class="registry-card" style="text-align:center">
                    <h2>RECORD AUTHENTICITY SCANNER</h2>
                    <input type="text" id="v-id" placeholder="ENTER RECORD ID" style="padding:15px; width:300px; background:#000; border:1px solid var(--sk-blue); color:var(--sk-blue)">
                    <button class="btn-verify" onclick="doScan()" style="padding:15px">RUN SCAN</button>
                    <div id="v-res" style="margin-top:30px"></div>
                </div>`;
        }

        function doScan() {
            const id = document.getElementById('v-id').value.toUpperCase();
            const res = document.getElementById('v-res');
            res.innerHTML = "SCANNING MASTER REGISTRY...";
            setTimeout(() => {
                const found = db.find(c => c.id === id);
                res.innerHTML = found ? 
                    `<div style="color:#00ff00; border:1px solid #00ff00; padding:20px">VALIDATED: ${found.name}</div>` : 
                    `<div style="color:red; border:1px solid red; padding:20px">INVALID: RECORD NOT FOUND</div>`;
            }, 1500);
        }

        // VIEW: PORTAL (VAULT)
        function renderPortal() {
            document.getElementById('main-view').innerHTML = `
                <div class="registry-card">
                    <h2>THE VAULT | USER ACCESS</h2>
                    <p>Current Access Level: <span class="status-pill">MASTER_USER</span></p>
                    <div style="margin-top:20px; padding:20px; background:rgba(255,255,255,0.05)">
                        <strong>Active Licenses:</strong> 02 <br>
                        <strong>Pending Certifications:</strong> 00
                    </div>
                </div>`;
        }

        window.onload = init;
    </script>
</body>
</html>
